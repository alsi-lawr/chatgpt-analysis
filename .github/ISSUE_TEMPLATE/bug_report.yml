name: Bug report
description: Report a reproducible correctness, packaging, or documentation defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Never attach a real export, transcript, workspace, queue, report, database, or credential. Reproduce the issue with synthetic data.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Input adapter or normalization
        - Metrics, segmentation, or deterministic coding
        - Worker queue, ingestion, review, or reduction
        - SQLite, reporting, or acceptance
        - Packaging or installation
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Include the smallest synthetic input/config and exact command needed to reproduce the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I have removed all real transcript data, credentials, and sensitive derived artifacts.
          required: true
