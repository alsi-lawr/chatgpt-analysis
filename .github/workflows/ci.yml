name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit and integration tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Check CLI entry points
        run: |
          PYTHONPATH=src python -m chatgpt_analysis --help >/dev/null
          PYTHONPATH=src python -m chatgpt_analysis.worker --help >/dev/null
      - name: Check README structure and links
        run: python scripts/check_readme.py

  package:
    name: Build and install distributions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: Build source and wheel distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build
      - name: Verify the installed wheel
        run: |
          python -m venv /tmp/chatgpt-analysis-package-check
          /tmp/chatgpt-analysis-package-check/bin/python -m pip install --upgrade pip
          /tmp/chatgpt-analysis-package-check/bin/python -m pip install dist/*.whl
          PATH="/tmp/chatgpt-analysis-package-check/bin:$PATH" \
            /tmp/chatgpt-analysis-package-check/bin/python tests/smoke_installed.py
          /tmp/chatgpt-analysis-package-check/bin/python -m pip check
